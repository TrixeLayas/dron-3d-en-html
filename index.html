<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dron 3D en HTML</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1e2a43, #0b0f18 60%);
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .scene {
      perspective: 900px;
      transform-style: preserve-3d;
    }

    .drone {
      position: relative;
      width: 220px;
      height: 220px;
      transform-style: preserve-3d;
      animation: float 4s ease-in-out infinite;
    }

    .body {
      position: absolute;
      inset: 70px;
      background: linear-gradient(160deg, #313d5a, #121c2f);
      border: 2px solid #4f6ba4;
      transform: translateZ(30px);
      border-radius: 16px;
      box-shadow: 0 0 25px #5d8bff44;
    }

    .arm {
      position: absolute;
      width: 18px;
      height: 130px;
      left: 101px;
      top: 45px;
      background: linear-gradient(180deg, #526892, #1f2942);
      border-radius: 9px;
      transform-origin: center;
    }

    .arm:nth-child(2) { transform: rotate(45deg) translateZ(15px); }
    .arm:nth-child(3) { transform: rotate(-45deg) translateZ(15px); }
    .arm:nth-child(4) { transform: rotate(135deg) translateZ(15px); }
    .arm:nth-child(5) { transform: rotate(-135deg) translateZ(15px); }

    .prop {
      position: absolute;
      width: 54px;
      height: 54px;
      border: 4px solid #89d2ff;
      border-radius: 50%;
      box-shadow: 0 0 16px #89d2ff88;
      transform: translateZ(24px);
      animation: spin .3s linear infinite;
    }

    .prop::before,
    .prop::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 40px;
      height: 6px;
      background: #c5f2ff;
      border-radius: 4px;
      transform: translate(-50%, -50%);
    }

    .prop::after {
      transform: translate(-50%, -50%) rotate(90deg);
    }

    .p1 { left: 5px; top: 5px; }
    .p2 { right: 5px; top: 5px; }
    .p3 { left: 5px; bottom: 5px; }
    .p4 { right: 5px; bottom: 5px; }

    .status-light {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      top: 103px;
      left: 103px;
      background: #25ff5b;
      box-shadow: 0 0 12px #25ff5b;
      transform: translateZ(36px);
      animation: blink 1s steps(2) infinite;
    }

    @keyframes spin {
      to { transform: translateZ(24px) rotate(1turn); }
    }

    @keyframes float {
      0%, 100% { transform: rotateX(18deg) rotateY(0deg) translateY(0); }
      50% { transform: rotateX(18deg) rotateY(180deg) translateY(-12px); }
    }

    @keyframes blink {
      50% { opacity: .35; }
    }
  </style>
</head>
<body>
  <main class="scene" aria-label="Dron 3D decorativo">
    <section class="drone">
      <div class="arm"></div>
      <div class="arm"></div>
      <div class="arm"></div>
      <div class="arm"></div>
      <div class="body"></div>
      <div class="prop p1"></div>
      <div class="prop p2"></div>
      <div class="prop p3"></div>
      <div class="prop p4"></div>
      <div class="status-light"></div>
    </section>
  </main>
</body>
</html>
